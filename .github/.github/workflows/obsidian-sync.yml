name: Sync CSV

on:
  push:
    paths:
      - 'LUMIK/Produits/**/*.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 << 'EOF'
import os, re, csv
rows = []
for root, dirs, files in os.walk('LUMIK/Produits'):
  for f in files:
    if not f.endswith('.md'): continue
    with open(os.path.join(root, f)) as file:
      c = file.read()
    id_m = re.search(r'\*\*ID\*\*\s*:\s*(\d+)', c)
    emoji_m = re.search(r'\*\*Emoji\*\*\s*:\s*(.)', c)
    prix_m = re.search(r'\*\*Prix EUR\*\*\s*:\s*(\d+)', c)
    region_m = re.search(r'\*\*Région\*\*\s*:\s*(\w+)', c)
    name_m = re.search(r'^#\s+(.+)$', c, re.M)
    if name_m and id_m and prix_m:
      rows.append({'id': id_m.group(1), 'nom': name_m.group(1).strip(), 'emoji': emoji_m.group(1) if emoji_m else '📦', 'prix_vente_eur': prix_m.group(1), 'region': region_m.group(1) if region_m else 'Japon'})
with open('produits.csv', 'w') as f:
  w = csv.DictWriter(f, ['id', 'nom', 'emoji', 'prix_vente_eur', 'region'])
  w.writeheader()
  w.writerows(rows)
EOF
