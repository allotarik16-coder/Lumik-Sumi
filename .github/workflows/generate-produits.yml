name: Régénérer produits.csv

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extraire produitsDefaut et générer produits.csv
        run: |
          python3 - <<'PYEOF'
          import re, csv, sys

          with open('index.html', encoding='utf-8') as f:
              src = f.read()

          # Extraire le bloc du tableau produitsDefaut
          m = re.search(r'const produitsDefaut\s*=\s*(\[.*?\]);', src, re.DOTALL)
          if not m:
              sys.exit('produitsDefaut introuvable dans index.html')

          bloc = m.group(1)

          # Extraire chaque objet {id:…, nom:…, emoji:…, prix_vente_eur:…, region:…}
          pattern = re.compile(
              r'\{[^}]*?id\s*:\s*(\d+)\s*,'
              r'[^}]*?nom\s*:\s*[\'"]([^\'"]+)[\'"]\s*,'
              r'[^}]*?emoji\s*:\s*[\'"]([^\'"]+)[\'"]\s*,'
              r'[^}]*?prix_vente_eur\s*:\s*(\d+)\s*,'
              r'[^}]*?region\s*:\s*[\'"]([^\'"]+)[\'"]',
              re.DOTALL
          )

          rows = pattern.findall(bloc)
          if not rows:
              sys.exit(f'Aucune ligne extraite — vérifiez le format du tableau')

          with open('produits.csv', 'w', newline='', encoding='utf-8') as out:
              w = csv.writer(out)
              w.writerow(['id', 'nom', 'emoji', 'prix_vente_eur', 'region'])
              for id_, nom, emoji, prix, region in rows:
                  w.writerow([id_, nom, emoji, prix, region])

          print(f'{len(rows)} produits écrits dans produits.csv')
          PYEOF

      - name: Commit si produits.csv a changé
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add produits.csv
          if git diff --cached --quiet; then
            echo 'Aucune modification — CSV déjà à jour.'
          else
            git commit -m 'chore: régénération automatique de produits.csv'
            git push
          fi
